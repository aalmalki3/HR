<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Org Design Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Prevent layout shift during load */
    [x-cloak] { display: none !important; }
    dialog::backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <div id="app" class="min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
      <div class="flex items-center gap-4">
        <h1 class="text-xl font-semibold text-gray-800">Org Design Portal</h1>
        <select id="dept-selector" class="hidden bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
          </select>
      </div>
      <div id="user-profile" class="text-sm font-medium text-gray-600">Loading...</div>
    </header>

    <main id="main-content" class="flex-1 p-6 max-w-7xl mx-auto w-full">
      <div id="initial-loader" class="flex flex-col items-center justify-center h-64 gap-4">
        <div class="loader ease-linear rounded-full border-4 border-gray-200 h-10 w-10"></div>
        <p class="text-gray-500 font-medium">Authenticating & Loading Data...</p>
      </div>
      
      <div id="dashboard" class="hidden space-y-8"></div>
    </main>
  </div>

  <dialog id="form-modal" class="bg-white rounded-xl shadow-2xl p-0 w-full max-w-md m-auto">
    <form id="mutation-form" method="dialog" class="p-6 flex flex-col gap-4">
      <h2 id="modal-title" class="text-lg font-bold text-gray-900">Add Item</h2>
      <div id="modal-fields" class="flex flex-col gap-4">
        </div>
      <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-gray-100">
        <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">Cancel</button>
        <button type="submit" id="submit-btn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center justify-center min-w-[100px] transition-colors">
          <span id="submit-text">Save</span>
          <div id="submit-spinner" class="loader ml-2 border-2 border-white/30 border-t-white h-4 w-4 hidden"></div>
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50" aria-live="polite"></div>

  <script>
    /**
     * ==========================================
     * STATE & REST API UTILITIES
     * ==========================================
     */
    const State = {
      user: null,
      activeDeptId: null,
      data: { levels: [], titles: [], jds: [], kpis: [] },
      modalAction: null,
      modalContextId: null
    };

    // Your active Google Apps Script deployment URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxQscDgzYuqqJeEsLO6df3NlQ3JRaBdu0BfEMWKx5Oe511ExNmveehpfkO16HoRfeU/exec";

    // REST fetch wrapper to communicate with GAS from GitHub
    const api = {
      async request(action, payload = null) {
        let url = GAS_URL;
        let options = { method: 'GET' };

        if (payload) {
          options.method = 'POST';
          // CRITICAL: Send as text/plain to avoid CORS preflight failures in Apps Script
          options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
          options.body = JSON.stringify({ action, ...payload });
        } else {
          url = `${GAS_URL}?action=${action}`;
        }

        const response = await fetch(url, options);
        const result = await response.json();
        
        if (result.error) throw new Error(result.error);
        return result.data;
      },

      getUserContext: () => api.request('getUserContext'),
      
      getDepartmentData: async (deptId) => {
        const response = await fetch(`${GAS_URL}?action=getDepartmentData&deptId=${deptId}`);
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result.data;
      },

      addJobTitle: (deptId, levelId, titleName) => api.request('addJobTitle', { deptId, levelId, titleName }),
      addJDPoint: (deptId, titleId, pointText) => api.request('addJDPoint', { deptId, titleId, pointText }),
      addKPI: (deptId, jdPointId, metric, target) => api.request('addKPI', { deptId, jdPointId, metric, target })
    };

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = type === 'success' ? 'bg-green-50 text-green-800 border-green-200' : 'bg-red-50 text-red-800 border-red-200';
      toast.className = `px-4 py-3 rounded-lg border shadow-sm transition-opacity duration-300 ${colors}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    /**
     * ==========================================
     * INITIALIZATION & DATA FETCHING
     * ==========================================
     */
    async function initApp() {
      try {
        const context = await api.getUserContext();
        if (!context.isAuthorized) throw new Error("Unauthorized. You do not manage any departments.");
        
        State.user = context;
        document.getElementById('user-profile').textContent = context.userEmail;
        
        const selector = document.getElementById('dept-selector');
        context.departments.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name;
          selector.appendChild(opt);
        });
        
        selector.classList.remove('hidden');
        selector.addEventListener('change', (e) => loadDepartment(e.target.value));
        
        // Load first authorized department
        await loadDepartment(context.departments[0].id);
      } catch (error) {
        document.getElementById('initial-loader').innerHTML = `<p class="text-red-600 font-semibold bg-red-50 p-4 rounded-lg">${error.message || error}</p>`;
      }
    }

    async function loadDepartment(deptId) {
      State.activeDeptId = deptId;
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('initial-loader').classList.remove('hidden');
      
      try {
        State.data = await api.getDepartmentData(deptId);
        renderDashboard();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        document.getElementById('initial-loader').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
      }
    }

    /**
     * ==========================================
     * RENDERING ENGINE
     * ==========================================
     */
    function renderDashboard() {
      const container = document.getElementById('dashboard');
      const { levels, titles, jds, kpis } = State.data;

      if (levels.length === 0) {
        container.innerHTML = `<div class="p-8 text-center bg-white rounded-xl border border-gray-200 text-gray-500">No organizational levels found. Ensure levels exist in the database.</div>`;
        return;
      }

      // Sort levels by rank
      const sortedLevels = [...levels].sort((a, b) => (a.Rank || 0) - (b.Rank || 0));

      container.innerHTML = sortedLevels.map(level => {
        const levelTitles = titles.filter(t => t.LevelID === level.LevelID);
        return `
          <section class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mb-6">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
              <h2 class="font-semibold text-gray-800 text-lg">${escapeHtml(level.LevelName)}</h2>
              <button onclick="openModal('addTitle', '${level.LevelID}')" class="text-sm font-medium text-blue-600 hover:text-blue-800">+ Add Title</button>
            </div>
            <div class="p-6 space-y-6">
              ${levelTitles.length === 0 ? `<p class="text-sm text-gray-400 italic">No roles defined at this level.</p>` : 
                levelTitles.map(title => renderTitleNode(title, jds, kpis)).join('')}
            </div>
          </section>
        `;
      }).join('');
    }

    function renderTitleNode(title, allJDs, allKPIs) {
      const titleJDs = allJDs.filter(jd => jd.TitleID === title.TitleID);
      
      return `
        <div class="border border-blue-100 rounded-lg p-5 bg-blue-50/20">
          <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-900 text-md flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              ${escapeHtml(title.TitleName)}
            </h3>
            <button onclick="openModal('addJD', '${title.TitleID}')" class="text-xs font-medium text-gray-500 hover:text-blue-600 border border-gray-200 bg-white px-2 py-1 rounded shadow-sm">+ Add Responsibility</button>
          </div>
          
          <ul class="space-y-3">
            ${titleJDs.map(jd => {
              const jdKPIs = allKPIs.filter(kpi => kpi.JDPointID === jd.JDPointID);
              return `
                <li class="ml-4 pl-4 border-l-2 border-gray-200">
                  <div class="text-sm text-gray-700 mb-2">${escapeHtml(jd.PointText)}</div>
                  <div class="bg-white p-3 rounded border border-gray-100 shadow-sm ml-2">
                    <div class="flex justify-between items-center mb-2">
                      <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Metrics & OKRs</span>
                      <button onclick="openModal('addKPI', '${jd.JDPointID}')" class="text-xs font-medium text-blue-600 hover:underline">+ Add KPI</button>
                    </div>
                    ${jdKPIs.length === 0 ? `<span class="text-xs text-gray-400">No KPIs tracked.</span>` : 
                      `<ul class="space-y-1">
                        ${jdKPIs.map(kpi => `
                          <li class="text-xs flex justify-between bg-gray-50 p-2 rounded">
                            <span class="font-medium text-gray-700">${escapeHtml(kpi.Metric)}</span>
                            <span class="text-gray-500 font-mono bg-white px-1 border border-gray-200 rounded">${escapeHtml(kpi.Target)}</span>
                          </li>
                        `).join('')}
                      </ul>`
                    }
                  </div>
                </li>
              `;
            }).join('')}
          </ul>
        </div>
      `;
    }

    /**
     * ==========================================
     * FORM & MUTATION HANDLING
     * ==========================================
     */
    function openModal(action, contextId) {
      State.modalAction = action;
      State.modalContextId = contextId;
      
      const title = document.getElementById('modal-title');
      const fields = document.getElementById('modal-fields');
      const form = document.getElementById('mutation-form');
      
      form.reset();
      
      if (action === 'addTitle') {
        title.textContent = 'Add Job Title';
        fields.innerHTML = `<input type="text" name="titleName" required placeholder="e.g. Senior Backend Engineer" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">`;
      } else if (action === 'addJD') {
        title.textContent = 'Add Job Responsibility';
        fields.innerHTML = `<textarea name="pointText" required rows="3" placeholder="Describe the core responsibility..." class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>`;
      } else if (action === 'addKPI') {
        title.textContent = 'Add KPI / OKR';
        fields.innerHTML = `
          <input type="text" name="metric" required placeholder="Metric (e.g. Server Uptime)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
          <input type="text" name="target" required placeholder="Target (e.g. 99.99%)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        `;
      }
      
      document.getElementById('form-modal').showModal();
    }

    function closeModal() {
      document.getElementById('form-modal').close();
    }

    document.getElementById('mutation-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      
      // UI Loading State
      const btn = document.getElementById('submit-btn');
      const text = document.getElementById('submit-text');
      const spinner = document.getElementById('submit-spinner');
      
      btn.disabled = true;
      text.textContent = 'Saving...';
      spinner.classList.remove('hidden');

      try {
        const deptId = State.activeDeptId;
        const ctxId = State.modalContextId;

        if (State.modalAction === 'addTitle') {
          const newId = await api.addJobTitle(deptId, ctxId, formData.get('titleName'));
          State.data.titles.push({ TitleID: newId, DeptID: deptId, LevelID: ctxId, TitleName: formData.get('titleName') });
        } 
        else if (State.modalAction === 'addJD') {
          const newId = await api.addJDPoint(deptId, ctxId, formData.get('pointText'));
          State.data.jds.push({ JDPointID: newId, TitleID: ctxId, PointText: formData.get('pointText') });
        } 
        else if (State.modalAction === 'addKPI') {
          const newId = await api.addKPI(deptId, ctxId, formData.get('metric'), formData.get('target'));
          State.data.kpis.push({ KpiID: newId, JDPointID: ctxId, Metric: formData.get('metric'), Target: formData.get('target') });
        }

        showToast('Successfully added!');
        closeModal();
        renderDashboard(); // Re-render local state
      } catch (error) {
        showToast(error.message || 'An error occurred while saving.', 'error');
      } finally {
        btn.disabled = false;
        text.textContent = 'Save';
        spinner.classList.add('hidden');
      }
    });

    // Helper to prevent XSS in Vanilla JS renders
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Bootstrap
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
